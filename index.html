<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOR KING E-Commerce Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body dir="ltr">
    <header>
        <h1>Welcome to STOR KING</h1>
        <div class="whatsapp">
            <a href="https://wa.me/your_number_here" target="_blank">Contact us on WhatsApp</a>
        </div>
    </header>
    <main>
        <section class="product-catalog">
            <h2>Our Products</h2>
            <div class="products">
                <!-- Product items will be added here -->
            </div>
        </section>
        <section class="admin-panel">
            <h2>Admin Panel</h2>
            <form action="#">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <button type="submit">Login</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 STOR KING. All rights reserved.</p>
    </footer>
</body>
</html>
